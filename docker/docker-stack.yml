# Hoster PaaS — Production Docker Swarm Stack
# Deployed by: install.sh -> deploy_stack()
# Usage: docker stack deploy -c docker-stack.yml hoster

version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hoster
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: hoster
    env_file:
      - /opt/hoster/config/env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hoster_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoster"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ─── Valkey (Redis-compatible) ────────────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    command: >
      valkey-server
      --requirepass ${VALKEY_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - valkey_data:/data
    networks:
      - hoster_internal
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ─── API Server ──────────────────────────────────────────────────────
  api:
    image: ghcr.io/componentor/hoster-api:${HOSTER_VERSION:-latest}
    env_file:
      - /opt/hoster/config/env
    networks:
      - hoster_internal
      - hoster_public
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`${PLATFORM_DOMAIN}`) && PathPrefix(`/api`)"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.routers.api.tls.certresolver=letsencrypt"
        - "traefik.http.services.api.loadbalancer.server.port=3000"
        - "traefik.http.services.api.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.api.loadbalancer.sticky.cookie.name=hoster_api"
        - "traefik.http.services.api.loadbalancer.sticky.cookie.httpOnly=true"

  # ─── Dashboard (SPA) ────────────────────────────────────────────────
  dashboard:
    image: ghcr.io/componentor/hoster-dashboard:${HOSTER_VERSION:-latest}
    networks:
      - hoster_public
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=Host(`${PLATFORM_DOMAIN}`)"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
        - "traefik.http.routers.dashboard.priority=1"
        - "traefik.http.services.dashboard.loadbalancer.server.port=80"

  # ─── Traefik Reverse Proxy ──────────────────────────────────────────
  traefik:
    image: traefik:v3.3
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/hoster/certs:/certs
    configs:
      - source: traefik_config
        target: /etc/traefik/traefik.yml
    networks:
      - hoster_public
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

  # ─── SSH Gateway ────────────────────────────────────────────────────
  ssh-gateway:
    image: ghcr.io/componentor/hoster-ssh-gateway:${HOSTER_VERSION:-latest}
    ports:
      - target: 2222
        published: 2222
        protocol: tcp
        mode: ingress
    env_file:
      - /opt/hoster/config/env
    networks:
      - hoster_internal
      - hoster_public
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

  # ─── Node Agent ─────────────────────────────────────────────────────
  agent:
    image: ghcr.io/componentor/hoster-agent:${HOSTER_VERSION:-latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/hoster/nfs-exports:/opt/hoster/nfs-exports
      - /opt/hoster/config:/opt/hoster/config:ro
    env_file:
      - /opt/hoster/config/env
    networks:
      - hoster_internal
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

  # ─── Container Registry ────────────────────────────────────────────
  registry:
    image: registry:2
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
        mode: ingress
    volumes:
      - registry_data:/var/lib/registry
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    networks:
      - hoster_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

# ─── Networks ──────────────────────────────────────────────────────────
networks:
  hoster_public:
    driver: overlay
    attachable: true
  hoster_internal:
    driver: overlay

# ─── Volumes ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  valkey_data:
    driver: local
  registry_data:
    driver: local

# ─── Configs ──────────────────────────────────────────────────────────
configs:
  traefik_config:
    file: ./traefik/traefik.yml
