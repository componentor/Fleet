# Fleet PaaS — Production Docker Swarm Stack
# Deployed by: install.sh -> deploy_stack()
# Usage: docker stack deploy -c docker-stack.yml fleet

version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    env_file:
      - /opt/fleet/config/env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fleet_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.hostname == ${FLEET_STATEFUL_NODE}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ─── Valkey (Redis-compatible) ────────────────────────────────────────
  valkey:
    image: valkey/valkey:8-alpine
    command: >
      valkey-server
      --requirepass ${VALKEY_PASSWORD}
      --appendonly yes
      --stop-writes-on-bgsave-error no
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    environment:
      REDISCLI_AUTH: ${VALKEY_PASSWORD}
    volumes:
      - valkey_data:/data
    networks:
      - fleet_internal
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.hostname == ${FLEET_STATEFUL_NODE}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ─── API Server ──────────────────────────────────────────────────────
  api:
    image: ghcr.io/componentor/fleet-api:${FLEET_VERSION:-main}
    env_file:
      - /opt/fleet/config/env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/fleet/nfs-exports/uploads:/srv/nfs/uploads
    networks:
      - fleet_internal
      - fleet_public
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.api.rule=Host(`${PLATFORM_DOMAIN}`) && PathPrefix(`/api`)"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.routers.api.tls.certresolver=letsencrypt"
        - "traefik.http.services.api.loadbalancer.server.port=3000"
        # robots.txt — intercept before dashboard catch-all (priority=1)
        - "traefik.http.routers.api-robots.rule=Host(`${PLATFORM_DOMAIN}`) && Path(`/robots.txt`)"
        - "traefik.http.routers.api-robots.entrypoints=websecure"
        - "traefik.http.routers.api-robots.tls.certresolver=letsencrypt"
        - "traefik.http.routers.api-robots.priority=10"
        - "traefik.http.routers.api-robots.service=api"

  # ─── Dashboard (SPA) ────────────────────────────────────────────────
  dashboard:
    image: ghcr.io/componentor/fleet-dashboard:${FLEET_VERSION:-main}
    networks:
      - fleet_public
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=Host(`${PLATFORM_DOMAIN}`)"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
        - "traefik.http.routers.dashboard.priority=1"
        - "traefik.http.services.dashboard.loadbalancer.server.port=80"

  # ─── Traefik Reverse Proxy ──────────────────────────────────────────
  traefik:
    image: traefik:v3.6
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - fleet_certs:/certs
    configs:
      - source: traefik_config
        target: /etc/traefik/traefik.yml
      - source: traefik_robots
        target: /etc/traefik/dynamic/robots.yml
    networks:
      - fleet_public
      - fleet_internal
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

  # ─── SSH Gateway ────────────────────────────────────────────────────
  ssh-gateway:
    image: ghcr.io/componentor/fleet-ssh-gateway:${FLEET_VERSION:-main}
    ports:
      - target: 2222
        published: 2222
        protocol: tcp
        mode: ingress
    env_file:
      - /opt/fleet/config/env
    networks:
      - fleet_internal
      - fleet_public
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

  # ─── Node Agent ─────────────────────────────────────────────────────
  agent:
    image: ghcr.io/componentor/fleet-agent:${FLEET_VERSION:-main}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/fleet/nfs-exports:/opt/fleet/nfs-exports
      - /opt/fleet/config:/opt/fleet/config:ro
    env_file:
      - /opt/fleet/config/env
    networks:
      - fleet_internal
    deploy:
      mode: global
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

  # ─── Container Registry ────────────────────────────────────────────
  # Proxied through Traefik at https://<PLATFORM_DOMAIN>/v2/
  # No published port — all traffic goes through Traefik (TLS, no insecure).
  # Docker push/pull uses the platform domain as the registry URL.
  registry:
    image: registry:2
    volumes:
      - registry_data:/var/lib/registry
      - /opt/fleet/registry-auth:/auth:ro
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
      REGISTRY_AUTH: htpasswd
      REGISTRY_AUTH_HTPASSWD_REALM: "Fleet Registry"
      REGISTRY_AUTH_HTPASSWD_PATH: /auth/htpasswd
      REGISTRY_HTTP_SECRET: ${REGISTRY_HTTP_SECRET:-fleet-registry-secret}
    networks:
      - fleet_internal
      - fleet_public
    healthcheck:
      test: ["CMD-SHELL", "wget -qSO /dev/null http://127.0.0.1:5000/v2/ 2>&1 | grep -q 'HTTP/' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
          - node.hostname == ${FLEET_STATEFUL_NODE}
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 60s
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.registry.rule=Host(`${PLATFORM_DOMAIN}`) && PathPrefix(`/v2`)"
        - "traefik.http.routers.registry.entrypoints=websecure"
        - "traefik.http.routers.registry.tls.certresolver=letsencrypt"
        - "traefik.http.services.registry.loadbalancer.server.port=5000"

# ─── Networks ──────────────────────────────────────────────────────────
networks:
  fleet_public:
    driver: overlay
    attachable: true
  fleet_internal:
    driver: overlay

# ─── Volumes ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  valkey_data:
    driver: local
  registry_data:
    driver: local
  fleet_certs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/fleet/certs

# ─── Configs ──────────────────────────────────────────────────────────
configs:
  traefik_config:
    file: ./traefik/traefik.yml
  traefik_robots:
    file: ./traefik/dynamic/robots.yml
