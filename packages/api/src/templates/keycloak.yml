slug: keycloak
name: Keycloak
description: Open-source identity and access management. Single sign-on, social login, and user federation. Includes PostgreSQL.
icon_url: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/keycloak.png
category: auth

variables:
  - name: KEYCLOAK_ADMIN
    label: Admin Username
    type: string
    default: admin
  - name: KEYCLOAK_ADMIN_PASSWORD
    label: Admin Password
    type: password
    required: true
    generate: true
  - name: POSTGRES_PASSWORD
    label: Database Password
    type: password
    required: true
    generate: true

services:
  - name: keycloak
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    ports:
      - target: 8080
        published: 8080
    env:
      KEYCLOAK_ADMIN: "{{KEYCLOAK_ADMIN}}"
      KEYCLOAK_ADMIN_PASSWORD: "{{KEYCLOAK_ADMIN_PASSWORD}}"
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://{{service:keycloak-db}}:5432/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: "{{POSTGRES_PASSWORD}}"

  - name: keycloak-db
    image: postgres:17-alpine
    env:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: "{{POSTGRES_PASSWORD}}"
      POSTGRES_DB: keycloak
    volumes:
      - source: keycloak_db_data
        target: /var/lib/postgresql/data

volumes:
  - keycloak_db_data
