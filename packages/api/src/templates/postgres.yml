slug: postgres
name: PostgreSQL
description: Powerful open-source relational database system with over 35 years of active development.
icon_url: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/postgresql.png
category: database

variables:
  - name: POSTGRES_USER
    label: Database User
    type: string
    default: postgres
  - name: POSTGRES_PASSWORD
    label: Database Password
    type: password
    required: true
    generate: true
  - name: POSTGRES_DB
    label: Database Name
    type: string
    default: postgres

services:
  - name: postgres
    image: postgres:17-alpine
    ports:
      - target: 5432
        published: 5432
    env:
      POSTGRES_USER: "{{POSTGRES_USER}}"
      POSTGRES_PASSWORD: "{{POSTGRES_PASSWORD}}"
      POSTGRES_DB: "{{POSTGRES_DB}}"
    volumes:
      - source: postgres_data
        target: /var/lib/postgresql/data

volumes:
  - postgres_data
