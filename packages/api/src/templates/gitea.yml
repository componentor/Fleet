slug: gitea
name: Gitea
description: Lightweight self-hosted Git service with issue tracking and CI/CD.
icon_url: https://about.gitea.com/gitea-text.svg
category: dev-tools

variables:
  - name: GITEA_DOMAIN
    label: Domain
    type: string
    default: localhost
  - name: POSTGRES_USER
    label: Database User
    type: string
    default: gitea
  - name: POSTGRES_PASSWORD
    label: Database Password
    type: password
    required: true
    generate: true
  - name: POSTGRES_DB
    label: Database Name
    type: string
    default: gitea
  - name: GITEA_SECRET_KEY
    label: Secret Key
    type: password
    required: true
    generate: true

services:
  - name: gitea
    image: gitea/gitea:1.22
    ports:
      - target: 3000
        published: 3000
      - target: 22
        published: 2222
        protocol: tcp
    env:
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: "{{service:gitea-db}}:5432"
      GITEA__database__NAME: "{{POSTGRES_DB}}"
      GITEA__database__USER: "{{POSTGRES_USER}}"
      GITEA__database__PASSWD: "{{POSTGRES_PASSWORD}}"
      GITEA__server__DOMAIN: "{{GITEA_DOMAIN}}"
      GITEA__server__ROOT_URL: "http://{{GITEA_DOMAIN}}:3000"
      GITEA__server__SSH_DOMAIN: "{{GITEA_DOMAIN}}"
      GITEA__security__SECRET_KEY: "{{GITEA_SECRET_KEY}}"
    volumes:
      - source: gitea_data
        target: /data
    domain: "{{GITEA_DOMAIN}}"

  - name: gitea-db
    image: postgres:17-alpine
    env:
      POSTGRES_USER: "{{POSTGRES_USER}}"
      POSTGRES_PASSWORD: "{{POSTGRES_PASSWORD}}"
      POSTGRES_DB: "{{POSTGRES_DB}}"
    volumes:
      - source: gitea_db_data
        target: /var/lib/postgresql/data

volumes:
  - gitea_data
  - gitea_db_data
