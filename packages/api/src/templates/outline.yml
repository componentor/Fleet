slug: outline
name: Outline
description: Modern team wiki and knowledge base. Beautiful, fast, and collaborative. Includes PostgreSQL and Redis.
icon_url: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/outline.png
category: productivity

variables:
  - name: OUTLINE_SECRET_KEY
    label: Secret Key
    type: password
    required: true
    generate: true
  - name: OUTLINE_UTILS_SECRET
    label: Utils Secret
    type: password
    required: true
    generate: true
  - name: POSTGRES_PASSWORD
    label: Database Password
    type: password
    required: true
    generate: true
  - name: OUTLINE_URL
    label: Application URL
    type: string
    required: true
    default: http://localhost:3000
  - name: OUTLINE_PORT
    label: Port
    type: string
    default: "3000"

services:
  - name: outline
    image: outlinewiki/outline:0.81
    ports:
      - target: 3000
        published: 3000
    env:
      SECRET_KEY: "{{OUTLINE_SECRET_KEY}}"
      UTILS_SECRET: "{{OUTLINE_UTILS_SECRET}}"
      DATABASE_URL: "postgres://outline:{{POSTGRES_PASSWORD}}@{{service:outline-db}}:5432/outline"
      REDIS_URL: "redis://{{service:outline-redis}}:6379"
      URL: "{{OUTLINE_URL}}"
      PORT: "{{OUTLINE_PORT}}"
      FILE_STORAGE: local
      FILE_STORAGE_LOCAL_ROOT_DIR: /var/lib/outline/data
    volumes:
      - source: outline_data
        target: /var/lib/outline/data

  - name: outline-db
    image: postgres:17-alpine
    env:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: "{{POSTGRES_PASSWORD}}"
      POSTGRES_DB: outline
    volumes:
      - source: outline_db_data
        target: /var/lib/postgresql/data

  - name: outline-redis
    image: redis:7-alpine
    volumes:
      - source: outline_redis_data
        target: /data

volumes:
  - outline_data
  - outline_db_data
  - outline_redis_data
