slug: wikijs
name: Wiki.js
description: Powerful open-source wiki with markdown support, Git sync, and beautiful UI. Includes PostgreSQL.
icon_url: https://js.wiki/favicon.ico
category: productivity

variables:
  - name: POSTGRES_PASSWORD
    label: Database Password
    type: password
    required: true
    generate: true
  - name: WIKIJS_ADMIN_EMAIL
    label: Admin Email
    type: string
    required: true
    default: admin@example.com

services:
  - name: wikijs
    image: ghcr.io/requarks/wiki:2
    ports:
      - target: 3000
        published: 3000
    env:
      DB_TYPE: postgres
      DB_HOST: "{{service:wikijs-db}}"
      DB_PORT: "5432"
      DB_USER: wikijs
      DB_PASS: "{{POSTGRES_PASSWORD}}"
      DB_NAME: wikijs

  - name: wikijs-db
    image: postgres:17-alpine
    env:
      POSTGRES_USER: wikijs
      POSTGRES_PASSWORD: "{{POSTGRES_PASSWORD}}"
      POSTGRES_DB: wikijs
    volumes:
      - source: wikijs_db_data
        target: /var/lib/postgresql/data

volumes:
  - wikijs_db_data
