slug: adminer
name: Adminer
description: Lightweight database management tool in a single PHP file. Supports MySQL, PostgreSQL, SQLite, and more.
icon_url: https://www.adminer.org/static/favicon.ico
category: database

variables:
  - name: ADMINER_DESIGN
    label: UI Theme
    type: string
    default: dracula

services:
  - name: adminer
    image: adminer:4
    ports:
      - target: 8080
        published: 8080
    env:
      ADMINER_DESIGN: "{{ADMINER_DESIGN}}"

volumes: []
