apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/part-of: fleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - name: registry
              containerPort: 5000
              protocol: TCP
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 128Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /v2/
              port: registry
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/part-of: fleet
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fleet-default
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/part-of: fleet
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: registry
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
      protocol: TCP
