apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fleet-agent
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/part-of: fleet
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-agent
    spec:
      serviceAccountName: fleet-agent
      tolerations:
        - operator: Exists  # Run on ALL nodes including control-plane
      containers:
        - name: agent
          image: ghcr.io/componentor/fleet-agent:latest
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ORCHESTRATOR
              value: kubernetes
          envFrom:
            - secretRef:
                name: fleet-agent-env
          ports:
            - name: health
              containerPort: 3001
              protocol: TCP
          resources:
            limits:
              memory: 256Mi
              cpu: 500m
            requests:
              memory: 64Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 30
