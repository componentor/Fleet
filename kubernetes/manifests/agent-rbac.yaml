apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-agent
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/part-of: fleet
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fleet-agent
  labels:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/part-of: fleet
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fleet-agent
  labels:
    app.kubernetes.io/name: fleet-agent
    app.kubernetes.io/part-of: fleet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fleet-agent
subjects:
  - kind: ServiceAccount
    name: fleet-agent
    namespace: fleet-system
