apiVersion: v1
kind: ServiceAccount
metadata:
  name: fleet-api
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: fleet-api
    app.kubernetes.io/part-of: fleet
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fleet-api
  labels:
    app.kubernetes.io/name: fleet-api
    app.kubernetes.io/part-of: fleet
rules:
  # Full namespace management
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Pod management (exec, logs, metrics)
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log", "pods/eviction"]
    verbs: ["get", "list", "create", "delete"]
  # Service management
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Secret management (registry credentials, TLS)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # PVC management
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Node management
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "update", "patch", "delete"]
  # Deployment management
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Job management (volume ops, node commands)
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Network policies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Traefik IngressRoute CRDs
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes", "middlewares"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Metrics API (container stats)
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fleet-api
  labels:
    app.kubernetes.io/name: fleet-api
    app.kubernetes.io/part-of: fleet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fleet-api
subjects:
  - kind: ServiceAccount
    name: fleet-api
    namespace: fleet-system
