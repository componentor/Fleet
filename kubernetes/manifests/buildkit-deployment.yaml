apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/part-of: fleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: buildkitd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buildkitd
    spec:
      containers:
        - name: buildkitd
          image: moby/buildkit:rootless
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
          ports:
            - name: buildkit
              containerPort: 1234
              protocol: TCP
          securityContext:
            seccompProfile:
              type: Unconfined
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: buildkit-state
              mountPath: /home/user/.local/share/buildkit
          resources:
            limits:
              memory: 4Gi
              cpu: "4"
            requests:
              memory: 512Mi
              cpu: 500m
      volumes:
        - name: buildkit-state
          persistentVolumeClaim:
            claimName: buildkit-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: buildkit-state
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/part-of: fleet
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fleet-default
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/part-of: fleet
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: buildkitd
  ports:
    - name: buildkit
      port: 1234
      targetPort: 1234
      protocol: TCP
