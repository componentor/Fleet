apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-api
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: fleet-api
    app.kubernetes.io/part-of: fleet
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-api
    spec:
      serviceAccountName: fleet-api
      containers:
        - name: api
          image: ghcr.io/componentor/fleet-api:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: ORCHESTRATOR
              value: kubernetes
          envFrom:
            - secretRef:
                name: fleet-api-env
          resources:
            limits:
              memory: 1Gi
              cpu: "2"
            requests:
              memory: 256Mi
              cpu: 250m
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-api
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: fleet-api
    app.kubernetes.io/part-of: fleet
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fleet-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      protocol: TCP
