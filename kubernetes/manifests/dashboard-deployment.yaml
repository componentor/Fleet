apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-dashboard
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: fleet-dashboard
    app.kubernetes.io/part-of: fleet
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: fleet-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleet-dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/componentor/fleet-dashboard:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            limits:
              memory: 256Mi
              cpu: 500m
            requests:
              memory: 64Mi
              cpu: 100m
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-dashboard
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: fleet-dashboard
    app.kubernetes.io/part-of: fleet
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fleet-dashboard
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
