apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fleet-system-allow-internal
  namespace: fleet-system
  labels:
    app.kubernetes.io/part-of: fleet
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic within fleet-system namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fleet-system
    # Allow traffic from all namespaces to Traefik (for health checks)
    - from: []
      ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
  egress:
    # Allow all outbound traffic from fleet-system
    - to: []
