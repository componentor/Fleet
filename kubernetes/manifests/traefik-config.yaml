apiVersion: v1
kind: ConfigMap
metadata:
  name: traefik-config
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: fleet
data:
  traefik.yml: |
    api:
      dashboard: false

    entryPoints:
      web:
        address: ":80"
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        address: ":443"
        http:
          tls:
            certResolver: letsencrypt

    providers:
      kubernetesCRD:
        allowCrossNamespace: true
        namespaces: []  # Watch all namespaces

    certificatesResolvers:
      letsencrypt:
        acme:
          storage: /certs/acme.json
          httpChallenge:
            entryPoint: web
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: traefik
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: fleet
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: traefik
  template:
    metadata:
      labels:
        app.kubernetes.io/name: traefik
    spec:
      serviceAccountName: traefik
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: traefik
          image: traefik:v3.6
          ports:
            - name: web
              containerPort: 80
              hostPort: 80
              protocol: TCP
            - name: websecure
              containerPort: 443
              hostPort: 443
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/traefik
              readOnly: true
            - name: certs
              mountPath: /certs
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 128Mi
              cpu: 250m
          livenessProbe:
            tcpSocket:
              port: web
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: traefik-config
        - name: certs
          persistentVolumeClaim:
            claimName: traefik-certs
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traefik-certs
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: fleet
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fleet-default
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: traefik
  namespace: fleet-system
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: fleet
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: traefik
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: fleet
rules:
  - apiGroups: [""]
    resources: ["services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses", "ingressclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses/status"]
    verbs: ["update"]
  - apiGroups: ["traefik.io"]
    resources: ["ingressroutes", "ingressroutetcps", "ingressrouteudps",
                "middlewares", "middlewaretcps", "tlsoptions", "tlsstores",
                "traefikservices", "serverstransports", "serverstransporttcps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: traefik
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: fleet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: traefik
subjects:
  - kind: ServiceAccount
    name: traefik
    namespace: fleet-system
